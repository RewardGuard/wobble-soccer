<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Wobble Soccer</title>
    <style>
      :root {
        --red: #e23b3b;
        --blue: #3b7be2;
        --ink: #14241a;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0c130e; }
      body {
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* ---------- HUD ---------- */
      #hud { position: fixed; inset: 0; pointer-events: none; }

      .scorebar {
        position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
        display: flex; align-items: center; gap: 14px;
        font-weight: 800; color: #fff; letter-spacing: 1px;
        text-shadow: 0 2px 4px rgba(0,0,0,.45);
      }
      .team { display: flex; align-items: center; gap: 8px; font-size: 26px; }
      .badge {
        width: 40px; height: 40px; border-radius: 10px;
        display: grid; place-items: center;
        box-shadow: inset 0 -4px 0 rgba(0,0,0,.25), 0 3px 6px rgba(0,0,0,.35);
        color: rgba(255,255,255,.92); font-size: 20px;
      }
      .badge.red { background: var(--red); }
      .badge.blue { background: var(--blue); }
      .score { font-size: 30px; min-width: 26px; text-align: center; }
      .clock {
        font-size: 24px; opacity: .92; margin: 0 6px;
        font-variant-numeric: tabular-nums;
      }

      #center-msg {
        position: absolute; top: 30%; left: 50%; transform: translate(-50%,-50%);
        color: #fff; font-size: 34px; font-weight: 800; text-align: center;
        text-shadow: 0 3px 0 rgba(0,0,0,.35), 0 0 22px rgba(0,0,0,.5);
        transition: opacity .25s ease; letter-spacing: 1px;
      }
      #goal-flash {
        position: absolute; inset: 0; display: grid; place-items: center;
        color: #fff; font-size: 90px; font-weight: 900; letter-spacing: 4px;
        text-shadow: 0 6px 0 rgba(0,0,0,.3), 0 0 40px rgba(255,255,255,.4);
        opacity: 0; transition: opacity .15s ease; transform: scale(1);
      }

      #minimap {
        position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
        opacity: .85; filter: drop-shadow(0 3px 6px rgba(0,0,0,.4));
      }

      #hint {
        position: absolute; bottom: 16px; left: 16px; color: #fff; opacity: .7;
        font-size: 13px; line-height: 1.5; text-shadow: 0 1px 2px rgba(0,0,0,.6);
      }
      kbd {
        background: rgba(255,255,255,.18); border-radius: 4px; padding: 1px 6px;
        font-family: inherit; font-weight: 700; font-size: 12px;
      }

      #pause {
        position: absolute; inset: 0; display: none; place-items: center;
        background: rgba(8,14,10,.55); backdrop-filter: blur(2px);
        color: #fff; text-align: center;
      }
      #pause.show { display: grid; }
      #pause h1 { font-size: 40px; margin-bottom: 10px; }
      #pause p { opacity: .85; font-size: 16px; line-height: 1.8; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="scorebar">
        <div class="team"><span class="badge red">CZ</span><span class="score" id="score-a">0</span></div>
        <span class="clock" id="clock">3:00</span>
        <div class="team"><span class="score" id="score-b">0</span><span class="badge blue">EN</span></div>
      </div>
      <div id="center-msg">Press <kbd>E</kbd> to kick off</div>
      <div id="goal-flash">GOAL!</div>
      <canvas id="minimap" width="220" height="132"></canvas>
      <div id="hint">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move &nbsp; · &nbsp;
        <kbd>mouse</kbd> aim &nbsp; · &nbsp; <kbd>Q</kbd> pass &nbsp; · &nbsp;
        <kbd>E</kbd> shoot &nbsp; · &nbsp; <kbd>Esc</kbd> pause &nbsp; · &nbsp; <kbd>T</kbd> AI demo
      </div>
      <div id="pause">
        <div>
          <h1>Paused</h1>
          <p><kbd>Esc</kbd> resume &nbsp;·&nbsp; <kbd>R</kbd> restart match</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
